version: 0.2

env:
  shell: bash

phases:
  install:
    runtime-versions:
      golang: latest

  pre_build:
    commands:
      - CI_BUILD=1
      - echo STEP pre_build START on `date`

      - docker --version
      - git config --global user.email "calicoci@cisco.com"
      - git config --global user.name "Calico CI"

      - echo "Logging to dockerhub"
      - docker login --username ${DOCKERHUB_USERNAME} --password=${DOCKERHUB_TOKEN} || true
      - ACCOUNT_ID="$(aws sts get-caller-identity --query "Account" --output text)"
      - >-
        aws ecr get-login-password --region $AWS_DEFAULT_REGION |
        docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

      - echo "Building dependencies image"
      - make builder-image

      - echo STEP pre_build DONE on `date`

  build:
    commands:
      - echo STEP build START on `date`

      - make clean-vpp
      - make images

      - make ci-lint
      - make ci-test
      - make ci-cov

      - make push
      - echo STEP build DONE on `date`

  # Run integration tests (kind & e2e)
  post_build:
    commands:
      - echo STEP post_build START on `date`

      - codebuild-breakpoint

      # - >-
      #   N_KIND_WORKERS=1
      #   VERBOSE=true
      #   NO_TAINT=true
      #   WAIT=true
      #   make kind
      # - make run-main-tests
      # - make kind-rm-cluster

      - echo STEP post_build DONE on `date`
