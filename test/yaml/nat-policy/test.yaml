---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: nat-policy
  name: np-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: np-server
  template:
    metadata:
      labels:
        app: np-server
        role: server
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  namespace: nat-policy
  name: np-service
spec:
  selector:
    app: np-server
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
# UDP echo server for UDP DNAT+policy tests
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: nat-policy
  name: np-udp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: np-udp-server
  template:
    metadata:
      labels:
        app: np-udp-server
        role: server
    spec:
      containers:
      - name: udp-echo
        image: nicolaka/netshoot
        command: ["/bin/sh", "-c"]
        args:
        - |
          python3 -c "
          import socket
          s = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
          s.bind(('', 9999))
          while True:
              data, addr = s.recvfrom(1024)
              s.sendto(data, addr)
          "
        ports:
        - containerPort: 9999
          protocol: UDP
---
apiVersion: v1
kind: Service
metadata:
  namespace: nat-policy
  name: np-udp-service
spec:
  selector:
    app: np-udp-server
  ports:
    - protocol: UDP
      port: 9999
      targetPort: 9999
---
# Client on the same node as the server
apiVersion: v1
kind: Pod
metadata:
  name: np-client-samehost
  namespace: nat-policy
  labels:
    role: client
spec:
  affinity:
    podAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: np-server
          topologyKey: kubernetes.io/hostname
  containers:
  - name: client
    image: nicolaka/netshoot
    command: ["sleep", "3600"]
---
# Client on a different node from the server
apiVersion: v1
kind: Pod
metadata:
  name: np-client
  namespace: nat-policy
  labels:
    role: client
spec:

  containers:
  - name: client
    image: nicolaka/netshoot
    command: ["sleep", "3600"]
---
# Pod that acts as both client and server for hairpin NAT + policy tests
apiVersion: v1
kind: Pod
metadata:
  name: np-hairpin
  namespace: nat-policy
  labels:
    app: np-hairpin
    role: hairpin
spec:
  containers:
  - name: server
    image: nicolaka/netshoot
    command: ["/bin/sh", "-c"]
    args:
    - python3 -m http.server 8080
    ports:
    - containerPort: 8080
    readinessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 3
      periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  namespace: nat-policy
  name: np-hairpin-service
spec:
  selector:
    app: np-hairpin
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
