---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: policy
  name: policy-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: policy-server
  template:
    metadata:
      labels:
        app: policy-server
        role: server
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  namespace: policy
  name: policy-service
spec:
  selector:
    app: policy-server
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
# Client on the same node as the server (for same-node policy tests)
apiVersion: v1
kind: Pod
metadata:
  name: policy-client-samehost
  namespace: policy
  labels:
    role: client
spec:
  affinity:
    podAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: policy-server
          topologyKey: kubernetes.io/hostname
  containers:
  - name: client
    image: nicolaka/netshoot
    command: ["sleep", "3600"]
---
# Client on a different node from the server (for cross-node policy tests)
apiVersion: v1
kind: Pod
metadata:
  name: policy-client
  namespace: policy
  labels:
    role: client
spec:
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: policy-server
          topologyKey: kubernetes.io/hostname
  containers:
  - name: client
    image: nicolaka/netshoot
    command: ["sleep", "3600"]
